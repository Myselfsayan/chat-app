<svg width="300" height="300" viewBox="0 0 300 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow-blue" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-teal" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="blue-grad" x1="30" y1="20" x2="160" y2="140" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#5B9DFF"/>
      <stop offset="100%" stop-color="#00CFFF"/>
    </linearGradient>
    <linearGradient id="teal-grad" x1="110" y1="110" x2="260" y2="260" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00CFFF"/>
      <stop offset="100%" stop-color="#00FFB2"/>
    </linearGradient>
  </defs>

  <!-- Large blue chat bubble (top-left) -->
  <rect x="20" y="20" width="160" height="118" rx="26" ry="26"
    fill="none" stroke="url(#blue-grad)" stroke-width="6"
    filter="url(#glow-blue)"/>
  <!-- Tail for blue bubble -->
  <path d="M52 138 L34 170 L80 138" fill="none" stroke="url(#blue-grad)" stroke-width="6"
    stroke-linejoin="round" filter="url(#glow-blue)"/>

  <!-- Small teal chat bubble (bottom-right) -->
  <rect x="118" y="130" width="152" height="112" rx="22" ry="22"
    fill="none" stroke="url(#teal-grad)" stroke-width="5.5"
    filter="url(#glow-teal)"/>
  <!-- Tail for teal bubble -->
  <path d="M238 242 L258 276 L214 242" fill="none" stroke="url(#teal-grad)" stroke-width="5.5"
    stroke-linejoin="round" filter="url(#glow-teal)"/>
</svg>
